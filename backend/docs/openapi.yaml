      - $ref: '#/components/parameters/ReportFormatParam'
      - $ref: '#/components/parameters/ReportAudienceParam'
    get:
      tags:
        - Tests
      summary: Generate report for psychologist or client
      description: |
        Generates a report on demand for a completed submission.
        The report is never stored as a file on the server and is rebuilt for each request.
        By default `audience=psychologist` returns a technical report for the specialist.
        Use `audience=client` to generate the detailed client-facing report that the psychologist can later send manually to the client.
        Use `format=html` or `format=docx`.
      operationId: getPsychologistReportBySessionId
      security:
        - psychologistSession: []
      responses:
        '200':
          description: Generated psychologist report
          content:
            text/html:
              schema:
                type: string
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
