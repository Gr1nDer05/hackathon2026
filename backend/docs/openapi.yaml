components:
  securitySchemes:
    psychologistSession:
      type: apiKey
      in: cookie
      name: session_id
      description: Psychologist session cookie returned by the psychologist login endpoint.
    adminSession:
      type: apiKey
      in: cookie
      name: admin_session_id
      description: Admin session cookie returned by the admin login endpoint.
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: "Must match the `csrf_token` cookie value on protected non-GET requests."
  parameters:
    TestIdParam:
      name: id
      in: path
      required: true
      description: Test identifier
      schema:
        type: integer
        format: int64
        minimum: 1
    QuestionIdParam:
      name: questionId
      in: path
      required: true
      description: Question identifier
      schema:
        type: integer
        format: int64
        minimum: 1
    RuleIdParam:
      name: ruleId
      in: path
      required: true
      description: Formula rule identifier
      schema:
        type: integer
        format: int64
        minimum: 1
    SubmissionSessionIdParam:
      name: sessionId
      in: path
      required: true
      description: Public test session identifier
      schema:
        type: integer
        format: int64
        minimum: 1
    TemplateIdParam:
      name: templateId
      in: path
      required: true
      description: Report template identifier
      schema:
        type: integer
        format: int64
        minimum: 1
    PsychologistIdParam:
      name: id
      in: path
      required: true
      description: Psychologist user identifier
      schema:
        type: integer
        format: int64
        minimum: 1
    SlugParam:
      name: slug
      in: path
      required: true
      description: Public test slug
      schema:
        type: string
        minLength: 1
    ReportFormatParam:
      name: format
      in: query
      required: false
      description: Report output format. Defaults to `html`.
      schema:
        type: string
        enum:
          - html
          - docx
    ReportAudienceParam:
      name: audience
      in: query
      required: false
      description: Report audience. Defaults to `psychologist`. Use `client` only from the psychologist workspace when preparing the report for later delivery to the client.
      schema:
        type: string
        enum:
          - psychologist
          - client
  responses:
    BadRequest:
      description: Invalid request payload or path parameter.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, invalid, or expired session credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated request is not allowed or fails CSRF/origin checks.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Required integration is not configured.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    AppStatus:
      type: object
      required:
        - status
        - name
      properties:
        status:
          type: string
          example: ok
        name:
          type: string
          example: Hackathon2026
    DatabaseStatusResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          example: ok
        message:
          type: string
          example: database connection successful
    ErrorResponse:
      type: object
      required:
        - message
        - field_errors
      properties:
        message:
          type: string
          example: Validation failed
        field_errors:
          type: object
          nullable: true
          additionalProperties:
            type: string
          example:
            email: Email already exists
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    User:
      type: object
      required:
        - id
        - email
        - full_name
        - role
        - is_active
        - portal_access_until
        - blocked_until
      properties:
        id:
          type: integer
          format: int64
        login:
          type: string
          description: Present for admin accounts, empty for psychologists.
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum:
            - admin
            - psychologist
            - client
        is_active:
          type: boolean
        portal_access_until:
          type: string
          format: date-time
          nullable: true
          description: "`null` when not set."
        blocked_until:
          type: string
          format: date-time
          nullable: true
          description: "`null` when not set."
        account_status:
          type: string
          description: Computed status used by the frontend for psychologist accounts.
          enum:
            - active
            - blocked
        subscription_status:
          type: string
          description: Computed subscription status used by the frontend for psychologist accounts.
          enum:
            - active
            - blocked
            - expired
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ReportTemplate:
      type: object
      required:
        - id
        - name
        - description
        - template_body
        - created_by
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        template_body:
          type: string
          description: |
            JSON configuration stored as a string. It supports separate `client` and `psychologist`
            sections with optional `title`, `meta_labels`, `section_titles`, `intro_paragraphs`,
            `closing_paragraphs`, and `chart_caption`.
          example: |
            {
              "client": {
                "title": "Индивидуальный отчет ПрофДНК",
                "section_titles": {
                  "summary": "Короткий вывод",
                  "chart_data": "График профиля"
                }
              },
              "psychologist": {
                "title": "Технический отчет профориентолога",
                "section_titles": {
                  "raw_scores": "Сырые показатели",
                  "answers_table": "Таблица ответов"
                }
              }
            }
        created_by:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateReportTemplateInput:
      type: object
      additionalProperties: false
      required:
        - name
        - template_body
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        template_body:
          type: string
          minLength: 2
          description: JSON configuration string for the report template.
    UpdateReportTemplateInput:
      type: object
      additionalProperties: false
      required:
        - name
        - template_body
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        template_body:
          type: string
          minLength: 2
          description: JSON configuration string for the report template.
    Test:
      type: object
      required:
        - id
        - title
        - description
        - created_by_user_id
        - has_participant_limit
        - status
        - is_public
        - started_sessions_count
        - in_progress_sessions_count
        - completed_sessions_count
        - last_started_at
        - last_completed_at
        - last_activity_at
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        created_by_user_id:
          type: integer
          format: int64
        report_template_id:
          type: integer
          format: int64
        recommended_duration:
          type: integer
          description: Recommended duration in minutes.
          minimum: 0
        max_participants:
          type: integer
          description: Maximum number of respondents allowed via the public link when `has_participant_limit` is `true`.
          minimum: 0
        has_participant_limit:
          type: boolean
          description: Whether the public link is restricted to a fixed number of respondents.
        collect_respondent_age:
          type: boolean
        collect_respondent_gender:
          type: boolean
        collect_respondent_education:
          type: boolean
        status:
          type: string
          enum:
            - draft
            - published
        public_slug:
          type: string
        is_public:
          type: boolean
        public_url:
          type: string
        started_sessions_count:
          type: integer
          minimum: 0
          description: Total number of started public sessions for the test.
        in_progress_sessions_count:
          type: integer
          minimum: 0
          description: Number of sessions currently in progress.
        completed_sessions_count:
          type: integer
          minimum: 0
        last_started_at:
          type: string
          format: date-time
          nullable: true
        last_completed_at:
          type: string
          format: date-time
          nullable: true
        last_activity_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateTestInput:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        report_template_id:
          type: integer
          format: int64
        recommended_duration:
          type: integer
          minimum: 0
        max_participants:
          type: integer
          description: Positive respondent limit used when `has_participant_limit` is `true`. Send `0` to keep the link available to everyone.
          minimum: 0
        has_participant_limit:
