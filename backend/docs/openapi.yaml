openapi: 3.0.3
info:
  title: Hackathon2026 Backend API
  version: 1.3.0
  description: |
    OpenAPI contract for the Hackathon2026 backend.

    Authentication model:
    - `POST /auth/psychologists/login` sets `session_id` and `csrf_token` cookies.
    - `POST /auth/admin/login` sets `admin_session_id` and `csrf_token` cookies.
    - Protected `GET` endpoints require the corresponding session cookie.
    - Protected non-`GET` endpoints also require header `X-CSRF-Token` with the same value as the `csrf_token` cookie.

    Practical notes for frontend integration:
    - Base URL in local development is `http://localhost:8080`.
    - Error responses use the unified shape `{ "message": "...", "field_errors": { ... } }`.
    - Browser CORS preflight is supported for configured `ALLOWED_ORIGINS`, including credentials and the `X-CSRF-Token` header.
    - Psychologist user payloads return `portal_access_until` and `blocked_until` as `null` when they are not set.
    - Psychologist user payloads may include computed `account_status` and `subscription_status`.
    - `GET /psychologists/tests` returns activity metrics such as started/completed counts and last activity timestamps for the “Мои опросники” dashboard.
    - Test creation defaults `status` to `published` when omitted.
    - Test update defaults `status` to `draft` when omitted.
    - Public test start requires `respondent_name` and `respondent_phone`.
    - `respondent_name` must contain at least first name and last name; patronymic is optional.
    - If a respondent re-opens the same public test with the same phone within 1 hour, the backend returns the in-progress session and saved answers.
    - Duplicate public test starts are rejected with `409 Conflict` only after the test has already been completed for that phone number.
    - In-progress public sessions expire after 1 hour of inactivity.
    - Optional respondent fields `age`, `gender`, and `education` become required when enabled on the test.
    - To clear admin-managed access dates, send `null` or an empty string for `portal_access_until` or `blocked_until`.
    - `PUT /admins/psychologists/{id}/access` also accepts `subscription_days` or `subscriptionDays` to extend portal access by 1 to 365 days.
    - Admin accounts seeded from `ADMIN_ACCOUNTS` start with a placeholder `@admin.local` email and can replace it via `PUT /admins/me`.
    - Request JSON bodies are strict: unknown fields are rejected by the backend.
servers:
  - url: http://localhost:8080
    description: Local development
  - url: /
    description: Same origin
tags:
  - name: System
  - name: Psychologist Auth
  - name: Psychologist Workspace
  - name: Report Templates
  - name: Tests
  - name: Questions
  - name: Formula Rules
  - name: Public Tests
  - name: Admin Auth
  - name: Admin
paths:
  /health:
    get:
      tags:
        - System
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppStatus'
  /testdb:
    get:
      tags:
        - System
      summary: Database connectivity check
      operationId: testDatabase
      responses:
        '200':
          description: Database connection is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseStatusResponse'
        '503':
          description: Database connection failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/psychologists/login:
    post:
      tags:
        - Psychologist Auth
      summary: Login psychologist
      description: Creates a psychologist session and issues both session and CSRF cookies.
      operationId: loginPsychologist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PsychologistLoginInput'
      responses:
        '200':
          description: Authenticated psychologist session created
          headers:
            Set-Cookie:
              description: "Sets `session_id` and `csrf_token` cookies."
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PsychologistAuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/psychologists/logout:
    post:
      tags:
        - Psychologist Auth
      summary: Logout psychologist
      operationId: logoutPsychologist
      security:
        - psychologistSession: []
          csrfToken: []
      responses:
        '200':
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/admin/login:
    post:
